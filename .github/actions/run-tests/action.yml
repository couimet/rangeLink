name: 'Run Tests'
description: 'Run pnpm test with coverage enforcement (thresholds from jest.config.js)'

inputs:
  package-filter:
    description: 'Optional package filter (e.g., "rangelink-core-ts") for per-package testing'
    required: false
    default: ''

outputs:
  coverage-summary:
    description: 'Coverage summary output'
    value: ${{ steps.test.outputs.summary }}
  unit-passed:
    description: 'Number of unit tests passed'
    value: ${{ steps.stats.outputs.unit-passed }}
  unit-total:
    description: 'Total number of unit tests'
    value: ${{ steps.stats.outputs.unit-total }}

runs:
  using: 'composite'
  steps:
    - name: Run tests with coverage
      id: test
      shell: bash
      run: |
        set -o pipefail
        if [ -n "${{ inputs.package-filter }}" ]; then
          echo "Running tests for package: ${{ inputs.package-filter }}"
          pnpm --filter "${{ inputs.package-filter }}" test 2>&1 | tee /tmp/jest-out.txt
        else
          echo "Running tests for all packages"
          pnpm test 2>&1 | tee /tmp/jest-out.txt
        fi

    - name: Extract unit test stats
      id: stats
      if: always()
      shell: bash
      run: |
        if [ -f /tmp/jest-out.txt ]; then
          UNIT_PASSED=$(grep -oP 'Tests:\s+\K\d+(?= passed)' /tmp/jest-out.txt | tail -1 || echo "0")
          UNIT_TOTAL=$(grep -oP 'Tests:.*\s\K\d+(?= total)' /tmp/jest-out.txt | tail -1 || echo "0")
        else
          UNIT_PASSED="0"
          UNIT_TOTAL="0"
        fi
        echo "unit-passed=${UNIT_PASSED}" >> "$GITHUB_OUTPUT"
        echo "unit-total=${UNIT_TOTAL}" >> "$GITHUB_OUTPUT"

    - name: Generate coverage summary
      if: always()
      shell: bash
      run: |
        if [ -d "coverage" ]; then
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Find all coverage-summary.json files
          for summary in $(find . -name "coverage-summary.json" -path "*/coverage/*"); do
            package_name=$(echo "$summary" | sed 's|./packages/||' | sed 's|/coverage/coverage-summary.json||')
            echo "### Package: \`$package_name\`" >> $GITHUB_STEP_SUMMARY

            # Extract coverage percentages using jq if available, otherwise use grep
            if command -v jq &> /dev/null; then
              jq -r '.total | "- **Lines:** \(.lines.pct)%\n- **Statements:** \(.statements.pct)%\n- **Functions:** \(.functions.pct)%\n- **Branches:** \(.branches.pct)%"' "$summary" >> $GITHUB_STEP_SUMMARY
            else
              echo "Coverage report available at: \`$summary\`" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          done
        fi
