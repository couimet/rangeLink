name: 'Post PR CI Summary'
description: 'Post a PR comment with CI run summary — duration, test counts, QA TC IDs exercised'

inputs:
  title:
    description: 'Heading text for the summary comment'
    required: true
  unit-passed:
    description: 'Number of unit tests passed (empty if N/A)'
    required: false
    default: ''
  unit-total:
    description: 'Total number of unit tests (empty if N/A)'
    required: false
    default: ''
  int-passing:
    description: 'Number of integration tests passing (empty if N/A)'
    required: false
    default: ''
  int-failed:
    description: 'Number of integration tests failed (empty if N/A)'
    required: false
    default: ''
  int-total:
    description: 'Total integration tests exercised (passing + failed; empty if N/A)'
    required: false
    default: ''
  report-file:
    description: 'Path to the test report file for re-run command extraction'
    required: false
    default: ''
  label-filter:
    description: "TC ID label filter — 'requires-extensions' for with-extensions job, empty for all automated without that label"
    required: false
    default: ''
  job-start:
    description: 'Epoch seconds when the CI job started (from date +%s)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Build PR comment body
      id: build
      shell: bash
      run: |
        .github/scripts/ci/build-pr-comment.sh \
          --title "${{ inputs.title }}" \
          --unit-passed "${{ inputs.unit-passed }}" \
          --unit-total "${{ inputs.unit-total }}" \
          --int-passing "${{ inputs.int-passing }}" \
          --int-failed "${{ inputs.int-failed }}" \
          --int-total "${{ inputs.int-total }}" \
          --report-file "${{ inputs.report-file }}" \
          --label-filter "${{ inputs.label-filter }}" \
          --job-start "${{ inputs.job-start }}" \
          > /tmp/pr-comment-body.md
    - name: Post PR CI summary
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        BODY=$(cat /tmp/pr-comment-body.md)
        JOB_KEY=$(echo "${{ inputs.title }}" | sed 's/ — run summary$//')

        RESPONSE=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
          -f body="$BODY")
        NEW_COMMENT_ID=$(echo "$RESPONSE" | jq -r '.id')

        PASS=$(grep -q '^### ✅' /tmp/pr-comment-body.md && echo true || echo false)
        if [ "$PASS" = "true" ] && [ -n "$NEW_COMMENT_ID" ] && [ "$NEW_COMMENT_ID" != "null" ]; then
          PREV_NODES=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.id != ${NEW_COMMENT_ID}) | select(.body | startswith(\"### ✅ ${JOB_KEY}\")) | .node_id" 2>/dev/null || true)
          for NID in $PREV_NODES; do
            gh api graphql -f query='mutation($id:ID!){minimizeComment(input:{subjectId:$id,classifier:OUTDATED}){clientMutationId}}' \
              -f id="$NID" 2>/dev/null || true
          done
        fi
