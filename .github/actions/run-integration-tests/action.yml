name: 'Run Integration Tests'
description: 'Run pnpm test:release:automated (VS Code extension host tests via @vscode/test-cli) under Xvfb — excludes assisted and extension-requiring tests'

outputs:
  int-passing:
    description: 'Number of integration tests passing'
    value: ${{ steps.stats.outputs.int-passing }}
  int-failed:
    description: 'Number of integration tests failed'
    value: ${{ steps.stats.outputs.int-failed }}

runs:
  using: 'composite'
  steps:
    - name: Install Xvfb and VS Code native dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends xvfb libgtk-3-0 libxss1 libnss3 libasound2t64

    - name: Cache VS Code test binary
      uses: actions/cache@v4
      with:
        path: ~/.vscode-test
        key: vscode-test-${{ runner.os }}-stable
        restore-keys: vscode-test-${{ runner.os }}-

    - name: Run integration tests under Xvfb
      id: run
      shell: bash
      run: |
        set -o pipefail
        xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
          pnpm test:release:automated --exclude-label requires-extensions --exclude-label cursor 2>&1 | tee /tmp/test-report-automated.txt

    - name: Extract integration test stats
      id: stats
      if: always()
      shell: bash
      run: |
        "$GITHUB_ACTION_PATH/../../scripts/ci/extract-test-stats.sh" --mode mocha /tmp/test-report-automated.txt >> "$GITHUB_OUTPUT"

    - name: Upload test report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report-automated
        path: /tmp/test-report-automated.txt
        retention-days: 30
