name: CI

on:
  # Trigger on pull requests to any branch
  pull_request:

  # Trigger on pushes to main branch
  push:
    branches:
      - main

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Fetch more history for TODO comparison in PRs
          fetch-depth: 0
          persist-credentials: false

      - name: Test & Validate
        uses: couimet/github-actions/typescript-ci@main

      - name: Check no prerelease deps
        uses: couimet/github-actions/check-no-prerelease-deps@main

      - name: Check TODOs/FIXMEs
        uses: ./.github/actions/check-todos
        with:
          # For PRs: compare with base branch
          # For pushes to main: just count current TODOs
          base-ref: ${{ github.event_name == 'pull_request' && github.base_ref || '' }}

  integration-tests:
    name: Integration Tests (${{ matrix.mode }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        include:
          - mode: automated
            action-mode: automated
            summary-title: 'CI / Integration Tests (automated) — run summary'
            label-filter: ''
            report-file: '/tmp/test-report-automated.txt'
          - mode: with extensions
            action-mode: extensions
            summary-title: 'CI / Integration Tests (with extensions) — run summary'
            label-filter: 'requires-extensions'
            report-file: '/tmp/test-report-with-extensions.txt'
          - mode: with overrides
            action-mode: overrides
            summary-title: 'CI / Integration Tests (with overrides) — run summary'
            label-filter: 'needs-override'
            report-file: '/tmp/test-report-with-overrides.txt'

    steps:
      - name: Record start time
        run: echo "JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: couimet/github-actions/setup-node-pnpm@main

      - name: Install dependencies
        uses: couimet/github-actions/install-deps@main

      - name: Run integration tests
        id: run-integration-tests
        uses: ./.github/actions/run-integration-tests
        with:
          mode: ${{ matrix.action-mode }}

      - name: Post CI summary comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: ./.github/actions/post-pr-ci-summary
        with:
          title: ${{ matrix.summary-title }}
          unit-passed: ''
          unit-total: ''
          int-passing: ${{ steps.run-integration-tests.outputs.int-passing }}
          int-failed: ${{ steps.run-integration-tests.outputs.int-failed }}
          int-total: ${{ steps.run-integration-tests.outputs.int-total }}
          report-file: ${{ matrix.report-file }}
          label-filter: ${{ matrix.label-filter }}
          job-start: ${{ env.JOB_START }}
